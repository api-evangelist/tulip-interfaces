aid: tulip-interfaces
name: Tulip Interfaces
description: >-
  Tulip is a manufacturing operations platform that enables frontline operations teams
  to build apps, connect machines and devices, and analyze production data without
  code. The Tulip REST API provides programmatic access to apps, tables, connectors,
  stations, automations, and analytics, supporting integration with ERP, MES, and
  industrial equipment on the shop floor.
type: Index
