apis:
  - aid: tulip-interfaces:tulip-api
    name: Tulip API
    description: >-
      The Tulip REST API gives programmatic access to the Tulip manufacturing operations
      platform, organized into namespaces covering apps, tables, table records, connectors,
      stations, and automations. Each namespace is independently versioned. JSON is returned
      by all endpoints. Authentication uses API key tokens scoped to a Tulip workspace.
    humanURL: https://support.tulip.co/apidocs/introduction
    baseURL: https://api.tulip.co
